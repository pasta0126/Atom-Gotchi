name: Deploy AtomGotchi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASS: ${{ secrets.WIFI_PASS }}
          API_URL:   ${{ secrets.API_URL }}
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          envs:     WIFI_SSID,WIFI_PASS,API_URL
          script: |
            set -e
            cd /Users/pasta0126/atom-gotchi

            echo "── git pull ──────────────────────────────"
            git pull origin main

            echo "── credentials.h ─────────────────────────"
            if [ ! -f firmware/src/credentials.h ]; then
              printf '#pragma once\n\n// Generado por GitHub Actions — no editar a mano\n#define WIFI_SSID  "%s"\n#define WIFI_PASS  "%s"\n#define API_URL    "%s"\n' \
                "$WIFI_SSID" "$WIFI_PASS" "$API_URL" > firmware/src/credentials.h
              echo "credentials.h creado"
            else
              echo "credentials.h ya existe, sin cambios"
            fi

            echo "── docker compose up ─────────────────────"
            docker compose up -d --build --remove-orphans

            echo "── limpieza de imágenes huérfanas ────────"
            docker image prune -f

            echo "── deploy completado ─────────────────────"
