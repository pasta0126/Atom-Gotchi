services:

  gotchi-api:
    build: ./api
    restart: unless-stopped
    volumes:
      - ./api/data:/app/data
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # ── Ajusta el Host y certresolver según tu setup ──
      - "traefik.http.routers.gotchi-api.rule=Host(`TUDOMINIO.COM`) && PathPrefix(`/api`)"
      - "traefik.http.routers.gotchi-api.entrypoints=websecure"
      - "traefik.http.routers.gotchi-api.tls=true"
      - "traefik.http.routers.gotchi-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.gotchi-api.loadbalancer.server.port=3000"

  gotchi-front:
    build: ./front
    restart: unless-stopped
    depends_on:
      - gotchi-api
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gotchi-front.rule=Host(`TUDOMINIO.COM`)"
      - "traefik.http.routers.gotchi-front.entrypoints=websecure"
      - "traefik.http.routers.gotchi-front.tls=true"
      - "traefik.http.routers.gotchi-front.tls.certresolver=letsencrypt"
      - "traefik.http.services.gotchi-front.loadbalancer.server.port=80"

networks:
  traefik:
    external: true   # red existente de Traefik
