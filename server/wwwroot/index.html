<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <title>AtomGotchi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-variant": "#262626",
            "surface-container-low": "#131313",
            "surface-container": "#1a1919",
            "on-surface-variant": "#adaaaa",
            "background": "#0e0e0e",
            "primary": "#6bff8f",
            "on-primary": "#005f28",
            "secondary": "#9492ff",
            "tertiary": "#ffd574",
            "error": "#ff7351",
            "on-surface": "#ffffff",
            "surface": "#0e0e0e",
            "surface-container-high": "#201f1f",
            "surface-container-lowest": "#000000",
            "surface-bright": "#2c2c2c",
            "outline-variant": "#494847",
          },
          borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
          fontFamily: {
            headline: ["Space Grotesk"],
            body: ["Inter"],
            label: ["Space Grotesk"],
            mono: ["Courier New", "Courier", "monospace"],
          }
        }
      }
    }
  </script>
  <style>
    .scanline {
      background: linear-gradient(to bottom, rgba(107,255,143,0.025) 50%, rgba(0,0,0,0) 50%);
      background-size: 100% 4px;
    }
    .grain {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)    scale(1);    opacity: 0.5; }
      50%  { transform: translateY(-8px) scale(1.15); opacity: 1;   }
      100% { transform: translateY(0)    scale(1);    opacity: 0.5; }
    }
    .zzz { animation: floatUp 2.4s ease-in-out infinite; }
    @keyframes pulse-dot {
      0%,100% { box-shadow: 0 0 4px 1px currentColor; opacity: 1; }
      50%      { box-shadow: 0 0 10px 3px currentColor; opacity: 0.7; }
    }
    .dot-pulse { animation: pulse-dot 1.8s ease-in-out infinite; }
    @keyframes pulse-badge {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.5; }
    }
    .badge-pulse { animation: pulse-badge 1.2s ease-in-out infinite; }
    body { min-height: 100dvh; }
    .btn-action {
      transition: background 0.15s, transform 0.1s, color 0.15s, box-shadow 0.15s;
    }
    .btn-action:active:not(:disabled) { transform: scale(0.93); }
    .btn-action:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body class="bg-[#0a0a0a] font-body text-on-surface flex flex-col items-center selection:bg-primary/30">

  <div class="fixed inset-0 pointer-events-none grain z-0"></div>

  <!-- TOP BAR -->
  <header class="fixed top-0 w-full max-w-md z-50 flex justify-between items-center px-5 h-14 bg-[#0e0e0e]/80 backdrop-blur-md">
    <div class="flex items-center gap-2">
      <span id="dot" class="w-2 h-2 rounded-full bg-[#444] transition-colors duration-500"></span>
      <span id="statusTxt" class="text-[10px] font-headline tracking-widest uppercase text-on-surface-variant">Sin conexión</span>
    </div>
    <h1 class="font-headline tracking-widest uppercase text-sm font-bold text-primary absolute left-1/2 -translate-x-1/2">ATOMGOTCHI</h1>
    <span id="lastSeen" class="text-[10px] font-headline text-on-surface-variant">—</span>
  </header>

  <!-- MAIN -->
  <main class="w-full max-w-md px-5 pt-20 pb-8 flex flex-col items-center gap-5 relative z-10">

    <!-- FEEDBACK -->
    <div class="h-6 flex items-center justify-center w-full">
      <div id="feedback" class="text-xs font-headline tracking-wide transition-all duration-300 opacity-0"></div>
    </div>

    <!-- DEVICE SCREEN -->
    <div id="screen"
         class="w-full aspect-square max-w-xs bg-surface-container-lowest rounded-2xl relative overflow-hidden transition-all duration-500"
         style="box-shadow: inset 0 0 30px rgba(107,255,143,0.08), 0 0 0 1px rgba(107,255,143,0.15);">

      <div class="absolute inset-0 scanline pointer-events-none z-10"></div>

      <div class="h-full w-full flex flex-col items-center justify-center relative">

        <!-- Zzz (sleeping) -->
        <div id="zzz" class="hidden absolute top-4 right-5 text-sm font-headline zzz" style="color:#9492ff;">Zzz</div>

        <!-- ASCII Face -->
        <div class="font-mono text-center select-none leading-tight" style="letter-spacing:0.25em;">
          <div id="eyes"  class="text-5xl transition-all duration-500" style="color:#6bff8f; text-shadow: 0 0 12px currentColor;">◕  ◕</div>
          <div id="mouth" class="text-3xl mt-1 transition-all duration-500" style="color:#6bff8f; text-shadow: 0 0 8px currentColor;">‿</div>
        </div>

        <!-- Mood badge -->
        <div class="absolute bottom-5 flex items-center gap-1.5 px-3 py-1 rounded-full border transition-all duration-500"
             style="border-color: rgba(107,255,143,0.25); background: rgba(107,255,143,0.05);">
          <span id="moodDot" class="w-1.5 h-1.5 rounded-full" style="background:#6bff8f;"></span>
          <span id="badge" class="text-[10px] font-headline font-bold tracking-widest" style="color:#6bff8f;">—</span>
        </div>

        <!-- Dead overlay -->
        <div id="deadOverlay" class="hidden absolute inset-0 flex flex-col items-center justify-center gap-3 z-20 rounded-2xl"
             style="background: rgba(0,0,0,0.88);">
          <div class="text-5xl">💀</div>
          <div class="font-headline font-bold tracking-widest text-sm text-on-surface-variant">GAME OVER</div>
          <button onclick="send('restart')"
                  class="mt-1 px-6 py-2 rounded-full font-headline text-[11px] font-bold tracking-widest
                         ring-1 ring-white/20 hover:ring-white/50 hover:bg-white/10 transition-all text-on-surface">
            REINICIAR
          </button>
        </div>
      </div>
    </div>

    <!-- STAT BARS -->
    <div class="w-full max-w-xs space-y-2.5">
      <!-- Hunger -->
      <div class="flex items-center gap-3">
        <span class="text-lg w-6 text-center">🍎</span>
        <div class="flex-1">
          <div class="flex justify-between mb-1">
            <span class="text-[9px] font-headline uppercase tracking-widest text-on-surface-variant">Hambre</span>
            <span id="hungerVal" class="text-[9px] font-headline text-on-surface-variant">—</span>
          </div>
          <div class="h-1.5 rounded-full bg-surface-container-high overflow-hidden">
            <div id="hungerBar" class="h-full rounded-full transition-all duration-700" style="width:80%;background:#6bff8f;"></div>
          </div>
        </div>
      </div>
      <!-- Happiness -->
      <div class="flex items-center gap-3">
        <span class="text-lg w-6 text-center">😊</span>
        <div class="flex-1">
          <div class="flex justify-between mb-1">
            <span class="text-[9px] font-headline uppercase tracking-widest text-on-surface-variant">Alegría</span>
            <span id="happinessVal" class="text-[9px] font-headline text-on-surface-variant">—</span>
          </div>
          <div class="h-1.5 rounded-full bg-surface-container-high overflow-hidden">
            <div id="happinessBar" class="h-full rounded-full transition-all duration-700" style="width:80%;background:#6bff8f;"></div>
          </div>
        </div>
      </div>
      <!-- Energy -->
      <div class="flex items-center gap-3">
        <span class="text-lg w-6 text-center">⚡</span>
        <div class="flex-1">
          <div class="flex justify-between mb-1">
            <span class="text-[9px] font-headline uppercase tracking-widest text-on-surface-variant">Energía</span>
            <span id="energyVal" class="text-[9px] font-headline text-on-surface-variant">—</span>
          </div>
          <div class="h-1.5 rounded-full bg-surface-container-high overflow-hidden">
            <div id="energyBar" class="h-full rounded-full transition-all duration-700" style="width:80%;background:#9492ff;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- STATUS ROW (poop · sick · age) -->
    <div class="flex items-center gap-2 w-full max-w-xs">
      <div id="poopBadge" style="display:none"
           class="badge-pulse flex items-center gap-1.5 px-2.5 py-1 rounded-full ring-1 ring-white/10 bg-surface-container-high text-xs">
        <span>💩</span>
        <span class="font-headline text-[9px] uppercase tracking-widest text-on-surface-variant">Limpiar</span>
      </div>
      <div id="sickBadge" style="display:none"
           class="badge-pulse flex items-center gap-1.5 px-2.5 py-1 rounded-full ring-1 ring-white/10 bg-surface-container-high text-xs">
        <span>🤒</span>
        <span class="font-headline text-[9px] uppercase tracking-widest text-on-surface-variant">Medicina</span>
      </div>
      <span id="ageDisplay" class="text-[9px] font-headline text-on-surface-variant ml-auto">—</span>
    </div>

    <!-- CARE BUTTONS 3×2 -->
    <div class="grid grid-cols-3 gap-2.5 w-full max-w-xs">

      <button class="btn-action flex flex-col items-center justify-center gap-1.5 p-4
                     bg-surface-container-high/60 backdrop-blur-sm rounded-xl
                     ring-1 ring-white/5 hover:bg-surface-container-high hover:ring-primary/30 group"
              onclick="send('feed')" id="btn-feed">
        <span class="text-xl group-hover:scale-110 transition-transform">🍎</span>
        <span class="text-[10px] font-headline text-on-surface-variant group-hover:text-primary transition-colors">Alimentar</span>
      </button>

      <button class="btn-action flex flex-col items-center justify-center gap-1.5 p-4
                     bg-surface-container-high/60 backdrop-blur-sm rounded-xl
                     ring-1 ring-white/5 hover:bg-surface-container-high hover:ring-tertiary/30 group"
              onclick="send('play')" id="btn-play">
        <span class="text-xl group-hover:scale-110 transition-transform">🎮</span>
        <span class="text-[10px] font-headline text-on-surface-variant group-hover:text-tertiary transition-colors">Jugar</span>
      </button>

      <button class="btn-action flex flex-col items-center justify-center gap-1.5 p-4
                     bg-surface-container-high/60 backdrop-blur-sm rounded-xl
                     ring-1 ring-white/5 hover:bg-surface-container-high hover:ring-primary/30 group"
              onclick="send('pet')" id="btn-pet">
        <span class="text-xl group-hover:scale-110 transition-transform">🤗</span>
        <span class="text-[10px] font-headline text-on-surface-variant group-hover:text-primary transition-colors">Acariciar</span>
      </button>

      <button class="btn-action flex flex-col items-center justify-center gap-1.5 p-4
                     bg-surface-container-high/60 backdrop-blur-sm rounded-xl
                     ring-1 ring-white/5 hover:bg-surface-container-high hover:ring-secondary/30 group"
              onclick="send('sleep')" id="btn-sleep">
        <span id="sleepIcon" class="text-xl group-hover:scale-110 transition-transform">💤</span>
        <span id="sleepLabel" class="text-[10px] font-headline text-on-surface-variant group-hover:text-secondary transition-colors">Dormir</span>
      </button>

      <button class="btn-action flex flex-col items-center justify-center gap-1.5 p-4
                     bg-surface-container-high/60 backdrop-blur-sm rounded-xl
                     ring-1 ring-white/5 hover:bg-surface-container-high hover:ring-primary/30 group"
              onclick="send('medicine')" id="btn-medicine">
        <span class="text-xl group-hover:scale-110 transition-transform">💊</span>
        <span class="text-[10px] font-headline text-on-surface-variant group-hover:text-primary transition-colors">Medicina</span>
      </button>

      <button class="btn-action flex flex-col items-center justify-center gap-1.5 p-4
                     bg-surface-container-high/60 backdrop-blur-sm rounded-xl
                     ring-1 ring-white/5 hover:bg-surface-container-high hover:ring-primary/30 group"
              onclick="send('clean')" id="btn-clean">
        <span class="text-xl group-hover:scale-110 transition-transform">🧹</span>
        <span class="text-[10px] font-headline text-on-surface-variant group-hover:text-primary transition-colors">Limpiar</span>
      </button>

    </div>

    <!-- FUN BUTTONS 2×1 -->
    <div class="grid grid-cols-2 gap-2.5 w-full max-w-xs">

      <button class="btn-action flex flex-col items-center justify-center gap-1.5 p-3
                     bg-surface-container/60 backdrop-blur-sm rounded-xl
                     ring-1 ring-white/5 hover:bg-surface-container hover:ring-secondary/20 group"
              onclick="send('shake')" id="btn-shake">
        <span class="text-lg group-hover:rotate-12 transition-transform">🌀</span>
        <span class="text-[10px] font-headline text-on-surface-variant group-hover:text-secondary transition-colors">Agitar</span>
      </button>

      <button class="btn-action flex flex-col items-center justify-center gap-1.5 p-3
                     bg-surface-container/60 backdrop-blur-sm rounded-xl
                     ring-1 ring-white/5 hover:bg-surface-container hover:ring-error/20 group"
              onclick="send('startle')" id="btn-startle">
        <span class="text-lg group-hover:scale-90 transition-transform">💥</span>
        <span class="text-[10px] font-headline text-on-surface-variant group-hover:text-error transition-colors">Asustar</span>
      </button>

    </div>


  </main>

  <script>
    const MOODS = [
      { name:'HAPPY',    eyes:'◕  ◕', mouth:'‿',  accent:'#6bff8f' }, // 0
      { name:'SLEEPING', eyes:'─  ─', mouth:'‿',  accent:'#9492ff' }, // 1
      { name:'BORED',    eyes:'·  ·', mouth:'⌢',  accent:'#6366f1' }, // 2
      { name:'DIZZY',    eyes:'@  @', mouth:'~',  accent:'#c084fc' }, // 3
      { name:'EXCITED',  eyes:'★  ★', mouth:'D',  accent:'#ffd574' }, // 4
      { name:'LAUGHING', eyes:'^  ^', mouth:'D',  accent:'#6bff8f' }, // 5
      { name:'ANGRY',    eyes:'>  <', mouth:'∧',  accent:'#ff7351' }, // 6
      { name:'STARTLED', eyes:'O  O', mouth:'o',  accent:'#ff7351' }, // 7
      { name:'ANNOYED',  eyes:'=  =', mouth:'¬',  accent:'#fb923c' }, // 8
      { name:'HAMBRE',   eyes:'°  °', mouth:'ω',  accent:'#ffd574' }, // 9
      { name:'TRISTE',   eyes:'T  T', mouth:'⌢',  accent:'#9492ff' }, // 10
      { name:'ENFERMO',  eyes:'x  x', mouth:'~',  accent:'#a3e635' }, // 11
      { name:'R.I.P.',   eyes:'x  x', mouth:'_',  accent:'#555555' }, // 12
    ];

    let prevMood = -1;
    let fbTimer  = null;

    function statColor(v) {
      if (v > 50) return '#6bff8f';
      if (v > 25) return '#ffd574';
      return '#ff7351';
    }

    function formatAge(h) {
      if (h < 0.1) return 'Recién nacido';
      if (h < 24)  return `${Math.floor(h)}h`;
      return `${Math.floor(h / 24)}d ${Math.floor(h % 24)}h`;
    }

    function applyState(s) {
      const m   = MOODS[s.mood] ?? MOODS[0];
      const a   = m.accent;
      const dead = s.dead ?? false;

      // Face
      const eyes  = document.getElementById('eyes');
      const mouth = document.getElementById('mouth');
      eyes.textContent  = m.eyes;
      mouth.textContent = m.mouth;
      eyes.style.color  = a;
      mouth.style.color = a;
      eyes.style.textShadow  = `0 0 12px ${a}88`;
      mouth.style.textShadow = `0 0 8px ${a}66`;

      // Badge
      const badge    = document.getElementById('badge');
      const moodDot  = document.getElementById('moodDot');
      const badgeWrap = badge.parentElement;
      badge.textContent = m.name;
      badge.style.color = a;
      moodDot.style.background = a;
      badgeWrap.style.borderColor = `${a}33`;
      badgeWrap.style.background  = `${a}0a`;

      // Screen glow
      document.getElementById('screen').style.boxShadow =
        `inset 0 0 30px ${a}14, 0 0 0 1px ${a}22, 0 0 40px ${a}0a`;

      // Zzz
      if (s.mood !== prevMood) {
        const zzz = document.getElementById('zzz');
        if (s.mood === 1) { zzz.classList.remove('hidden'); zzz.style.color = a; }
        else              { zzz.classList.add('hidden'); }
        prevMood = s.mood;
      }

      // Dead overlay
      document.getElementById('deadOverlay').style.display = dead ? 'flex' : 'none';

      // Disable care buttons when dead
      ['btn-feed','btn-play','btn-pet','btn-sleep','btn-medicine','btn-clean',
       'btn-shake','btn-startle'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.disabled = dead;
      });

      // Stat bars
      const hunger    = s.hunger    ?? 0;
      const happiness = s.happiness ?? 0;
      const energy    = s.energy    ?? 0;

      document.getElementById('hungerVal').textContent    = hunger;
      document.getElementById('happinessVal').textContent = happiness;
      document.getElementById('energyVal').textContent    = energy;

      const hBar = document.getElementById('hungerBar');
      hBar.style.width      = hunger + '%';
      hBar.style.background = statColor(hunger);

      const haBar = document.getElementById('happinessBar');
      haBar.style.width      = happiness + '%';
      haBar.style.background = statColor(happiness);

      const eBar = document.getElementById('energyBar');
      eBar.style.width      = energy + '%';
      eBar.style.background = energy > 50 ? '#9492ff' : energy > 25 ? '#ffd574' : '#ff7351';

      // Status badges
      document.getElementById('poopBadge').style.display = s.needsClean ? 'flex' : 'none';
      document.getElementById('sickBadge').style.display = s.sick       ? 'flex' : 'none';

      // Highlight medicine / clean buttons when needed
      const medBtn   = document.getElementById('btn-medicine');
      const cleanBtn = document.getElementById('btn-clean');
      medBtn.style.boxShadow   = s.sick       ? '0 0 0 1px #a3e63566' : '';
      cleanBtn.style.boxShadow = s.needsClean ? '0 0 0 1px #ffd57466' : '';

      // Sleep button toggle
      document.getElementById('sleepIcon').textContent  = s.sleeping ? '☀️' : '💤';
      document.getElementById('sleepLabel').textContent = s.sleeping ? 'Despertar' : 'Dormir';

      document.getElementById('ageDisplay').textContent = formatAge(s.ageHours ?? 0);
    }

    function setOnline(online, updatedAt) {
      const dot = document.getElementById('dot');
      const txt = document.getElementById('statusTxt');
      if (online) {
        dot.style.background = '#6bff8f';
        dot.style.color      = '#6bff8f';
        dot.classList.add('dot-pulse');
        txt.textContent = 'En línea';
        txt.style.color = '#6bff8f';
      } else {
        dot.style.background = '#444';
        dot.style.color      = '#444';
        dot.classList.remove('dot-pulse');
        txt.textContent = 'Sin conexión';
        txt.style.color = '';
      }
      document.getElementById('lastSeen').textContent =
        updatedAt
          ? new Date(updatedAt).toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
          : '—';
    }

    function feedback(msg, ok) {
      const el = document.getElementById('feedback');
      el.textContent = msg;
      el.style.color   = ok ? '#6bff8f' : '#ff7351';
      el.style.opacity = '1';
      clearTimeout(fbTimer);
      fbTimer = setTimeout(() => { el.style.opacity = '0'; }, 2500);
    }

    async function poll() {
      try {
        const res = await fetch('/api/state/current');
        if (res.status === 204) { setOnline(false, null); return; }
        const s = await res.json();
        const ageMs = Date.now() - new Date(s.updatedAt).getTime();
        setOnline(ageMs < 12000, s.updatedAt);
        applyState(s);
      } catch {
        setOnline(false, null);
      }
    }

    const LABELS = {
      feed:     '¡Comido! 🍎',
      play:     '¡A jugar! 🎮',
      pet:      'Acariciado 🤗',
      sleep:    'Cambiado 💤',
      medicine: '¡Curado! 💊',
      clean:    '¡Limpio! 🧹',
      shake:    'Agitado 🌀',
      startle:  '¡Asustado! 💥',
      restart:  '¡Renacido! ✨',
    };

    async function send(cmd) {
      const btns = document.querySelectorAll('.btn-action');
      btns.forEach(b => b.disabled = true);
      try {
        const res = await fetch('/api/command', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command: cmd }),
        });
        feedback(res.ok ? `✓ ${LABELS[cmd] ?? cmd}` : '✗ error', res.ok);
        if (res.ok) poll(); // refresh inmediato
      } catch {
        feedback('✗ sin red', false);
      } finally {
        // Re-enable non-dead buttons (poll() will re-apply dead state)
        btns.forEach(b => b.disabled = false);
      }
    }

    poll();
    setInterval(poll, 3000);
  </script>
</body>
</html>
